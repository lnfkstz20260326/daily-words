    {\"w\":\"favorite\",\"p\":\"/feiverit/\",\"m\":\"µ£ĆÕ¢£µ¼óńÜä\",\"e\":\"Blue is my favorite color.\",\"ez\":\"ĶōØĶē▓µś»µłæµ£ĆÕ¢£µ¼óńÜäķó£Ķē▓ŃĆé\",\"t\":\"ÕÅæķ¤│ÕāÅķŻ×µłæķöÉńē╣\"},
    {\"w\":\"weather\",\"p\":\"/weder/\",\"m\":\"Õż®µ░ö\",\"e\":\"What is the weather like today?\",\"ez\":\"õ╗ŖÕż®Õż®µ░öµĆÄõ╣łµĀĘ’╝¤\",\"t\":\"ÕÆīwhetherÕÉīķ¤│\"},
    {\"w\":\"together\",\"p\":\"/tegeder/\",\"m\":\"õĖĆĶĄĘ\",\"e\":\"Lets play together after school.\",\"ez\":\"µöŠÕŁ”ÕÉÄõĖĆĶĄĘńÄ®ÕÉ¦ŃĆé\",\"t\":\"to+gether=ĶüÜķøåÕ£©õĖĆĶĄĘ\"}
]
PHRASES=[
    {\"ph\":\"What time is it?\",\"p\":\"/wot taim iz it/\",\"m\":\"ńÄ░Õ£©ÕćĀńé╣õ║å\",\"sc\":\"µā│ń¤źķüōµŚČķŚ┤µŚČ\",\"e\":\"What time is it now?\",\"ez\":\"ńÄ░Õ£©ÕćĀńé╣õ║å’╝¤\",\"t\":\"time=µŚČķŚ┤\"},
    {\"ph\":\"I am hungry.\",\"p\":\"/ai em hangri/\",\"m\":\"µłæķź┐õ║å\",\"sc\":\"ĶéÜÕŁÉķź┐µŚČ\",\"e\":\"Mom I am hungry can I eat?\",\"ez\":\"Õ”łÕ”łµłæķź┐õ║åĶāĮÕÉāõĖ£Ķź┐ÕÉŚ’╝¤\",\"t\":\"hungry=ķź┐\"},
    {\"ph\":\"Can you help me?\",\"p\":\"/ken ju help mi/\",\"m\":\"õĮĀĶāĮÕĖ«µłæÕÉŚ\",\"sc\":\"ķ£ĆĶ”üÕĖ«Õ┐ÖµŚČ\",\"e\":\"Can you help me with this?\",\"ez\":\"õĮĀĶāĮÕĖ«µłæÕüÜĶ┐ÖõĖ¬ÕÉŚ’╝¤\",\"t\":\"help=ÕĖ«ÕŖ®\"},
    {\"ph\":\"I do not understand.\",\"p\":\"/ai dont understend/\",\"m\":\"µłæõĖŹµśÄńÖĮ\",\"sc\":\"µ▓ĪÕÉ¼µćéµŚČ\",\"e\":\"I do not understand please say again.\",\"ez\":\"µłæõĖŹµśÄńÖĮĶ»ĘÕåŹĶ»┤õĖĆķüŹŃĆé\",\"t\":\"understand=ńÉåĶ¦Ż\"},
    {\"ph\":\"See you tomorrow!\",\"p\":\"/si ju temoro/\",\"m\":\"µśÄÕż®Ķ¦ü\",\"sc\":\"ÕæŖÕł½µŚČ\",\"e\":\"Bye see you tomorrow!\",\"ez\":\"ÕåŹĶ¦üµśÄÕż®Ķ¦ü’╝ü\",\"t\":\"see=ń£ŗĶ¦ü+tomorrow=µśÄÕż®\"}
]
date_str,day_name,day_type=get_info()
items=WORDS if day_type==\"word\" else PHRASES
cards=\"\"
for i,it in enumerate(items,1):
    en=it.get(\"w\",it.get(\"ph\",\"\"))
    ex=it[\"e\"]
    cards+=f\"<div class=card><div class=num>0{i}</div><div class=en>{en}</div><div class=ph>{it[chr(112)]}</div><div class=mn>{it[chr(109)]}</div>\"
    if \"sc\" in it: cards+=f\"<div class=sc>Õ£║µÖ»’╝Ü{it[chr(115)+chr(99)]}</div>\"
    cards+=f\"<div class=ex><div>{ex}</div><div class=zh>{it[chr(101)+chr(122)]}</div></div><div class=tip>­¤ÆĪ{it[chr(116)]}</div>\"
    cards+=f\"<div class=btns><button onclick=speak(&#39;{en}&#39;,0.7)>­¤ÉóµģóķĆ¤Ķ»Źx3</button><button onclick=speak(&#39;{en}&#39;,0.85)>­¤ÜĆÕīĆķĆ¤Ķ»Źx3</button><button onclick=speak(&#39;{ex}&#39;,0.7)>­¤ÉóµģóķĆ¤ÕÅźx3</button><button onclick=speak(&#39;{ex}&#39;,0.85)>­¤ÜĆÕīĆķĆ¤ÕÅźx3</button><button onclick=speak(&#39;{ex}&#39;,1.0)>ŌÜĪÕĖĖķĆ¤ÕÅźx3</button><button onclick=stop()>ŌÅ╣Õü£µŁó</button></div></div>\"
title=\"µ»ÅµŚźĶŗ▒Ķ»ŁÕŹĢĶ»Ź\" if day_type==\"word\" else \"µ»ÅµŚźĶŗ▒Ķ»ŁÕÅŻĶ»Ł\"
page=f\"\"\"<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content=width=device-width,initial-scale=1><title>{title}</title><style>*{{margin:0;padding:0;box-sizing:border-box}}body{{font-family:Microsoft YaHei,sans-serif;background:linear-gradient(135deg,#e0f7fa,#bbdefb);padding:20px}}.container{{max-width:800px;margin:0 auto}}.header{{background:white;border-radius:20px;padding:20px;text-align:center;margin-bottom:20px;box-shadow:0 4px 15px rgba(0,0,0,.1)}}h1{{color:#1565c0;font-size:2em}}.top{{display:flex;gap:10px;justify-content:center;margin-bottom:20px}}.card{{background:white;border-radius:15px;padding:20px;margin-bottom:20px;box-shadow:0 4px 15px rgba(0,0,0,.1)}}.num{{display:inline-block;width:36px;height:36px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-radius:50%;text-align:center;line-height:36px;font-weight:bold;margin-bottom:10px}}.en{{font-size:1.8em;font-weight:bold;color:#333}}.ph{{color:#666;margin:5px 0}}.mn{{background:#f5f5f5;padding:10px;border-radius:8px;font-size:1.2em;margin:10px 0}}.sc{{background:#e3f2fd;padding:8px;border-radius:8px;color:#1565c0;margin:8px 0}}.ex{{background:#fff3e0;padding:12px;border-radius:8px;margin:10px 0}}.zh{{color:#666;margin-top:5px}}.tip{{background:#e8f5e9;padding:8px;border-radius:8px;color:#2e7d32;margin:10px 0}}.btns{{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}}button{{padding:8px 14px;border:none;border-radius:20px;cursor:pointer;font-size:.85em}}button:nth-child(1),button:nth-child(3){{background:#ff9800;color:white}}button:nth-child(2),button:nth-child(4){{background:#2196f3;color:white}}button:nth-child(5){{background:#4caf50;color:white}}button:nth-child(6){{background:#f44336;color:white}}.pbtn{{background:#667eea;color:white;padding:10px 20px}}.sbtn{{background:#764ba2;color:white;padding:10px 20px}}</style></head><body><div class=container><div class=header><h1>­¤ōÜ {title}</h1><p>{date_str} {day_name}</p></div><div class=top><button class=pbtn onclick=autoPlay()>Ō¢Č’ĖÅ Õ╝ĆÕ¦ŗÕŠ¬ńÄ»µ£ŚĶ»╗</button><button class=sbtn onclick=\"location.href=&#39;./index.html&#39;\">Ō¼ģ’ĖÅ Ķ┐öÕø×ķĆēµŗ®</button></div>{cards}</div><script>let playing=false;function speak(t,r){{window.speechSynthesis.cancel();for(let i=0;i<3;i++){{const u=new SpeechSynthesisUtterance(t);u.lang=&#39;en-US&#39;;u.rate=r;const vv=speechSynthesis.getVoices();const v=vv.find(v=>v.name.includes(&#39;Jenny&#39;))||vv.find(v=>v.name.includes(&#39;Aria&#39;))||vv[0];if(v)u.voice=v;speechSynthesis.speak(u)}}}}function stop(){{speechSynthesis.cancel();playing=false}}async function autoPlay(){{if(playing)return;playing=true;const cs=document.querySelectorAll(&#39;.card&#39;);while(playing){{for(let c of cs){{if(!playing)break;await sp(c.querySelector(&#39;.en&#39;).textContent,0.7);await sl(800);await sp(c.querySelector(&#39;.ex div&#39;).textContent,0.85);await sl(2000)}}}}}}function sp(t,r){{return new Promise(v=>{{const u=new SpeechSynthesisUtterance(t);u.lang=&#39;en-US&#39;;u.rate=r;u.onend=v;speechSynthesis.speak(u)}})}}function sl(ms){{return new Promise(r=>setTimeout(r,ms))}}</script></body></html>\"\"\"
open(date_str+\".html\",\"w\",encoding=\"utf-8\").write(page)
print(\"Generated\",date_str+\".html\")
data=[]
if os.path.exists(\"index.html\"):
    src=open(\"index.html\",encoding=\"utf-8\").read()
    m=re.search(r\"const DATA=(\$$.*?\$$);\",src,re.DOTALL)
    if m:
        try: data=json.loads(m.group(1))
        except: pass
if not any(d[\"date\"]==date_str for d in data):
    ww=[{\"en\":x.get(\"w\",x.get(\"ph\",\"\")),\"zh\":x[\"m\"]} for x in items]
    ss=[{\"en\":x[\"e\"],\"zh\":x[\"ez\"]} for x in items]
    data.append({\"date\":date_str,\"day\":day_name,\"type\":day_type,\"title\":title,\"words\":ww,\"sentences\":ss})
dj=json.dumps(data,ensure_ascii=False)
idx=f\"\"\"<!DOCTYPE html><html lang=zh-CN><head><meta charset=UTF-8><meta name=viewport content=width=device-width,initial-scale=1><title>µ»ÅµŚźĶŗ▒Ķ»ŁÕŁ”õ╣Ā</title><style>*{{margin:0;padding:0;box-sizing:border-box}}body{{font-family:Microsoft YaHei,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}}.container{{max-width:900px;margin:0 auto}}.header{{text-align:center;color:white;margin-bottom:30px}}h1{{font-size:2.5em;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,.3)}}p{{opacity:.9;font-size:1.2em}}.grid{{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}}.card{{background:white;border-radius:15px;padding:20px;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,.2);transition:.3s}}.card:hover{{transform:translateY(-5px)}}.dh{{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #eee}}.dd{{color:#667eea;font-weight:bold}}.dt{{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:3px 10px;border-radius:12px;font-size:.8em}}.dt.phrase{{background:linear-gradient(135deg,#f093fb,#f5576c)}}.dtitle{{color:#333;font-size:1.1em;margin-bottom:8px}}.tag{{display:inline-block;background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:10px;margin:2px;font-size:.8em}}</style></head><body><div class=container><div class=header><h1>­¤ōÜ µ»ÅµŚźĶŗ▒Ķ»ŁÕŁ”õ╣Ā</h1><p>Õ░ÅÕŁ”õ║öÕ╣┤ń║¦µ░┤Õ╣│ ┬Ę µ»ÅÕż®Ķ┐øµŁźõĖĆńé╣ńé╣</p></div><div class=grid id=g></div></div><script>const DATA={dj};[...DATA].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(d=>{{const c=document.createElement(&#39;div&#39;);c.className=&#39;card&#39;;c.onclick=()=>location.href=d.date+&#39;.html&#39;;const tags=d.words.slice(0,3).map(w=>&#39;<span class=tag>&#39;+w.en+&#39;</span>&#39;).join(&#39;&#39;);c.innerHTML=&#39;<div class=dh><span class=dd>&#39;+d.date+&#39; &#39;+d.day+&#39;</span><span class=\"dt &#39;+d.type+&#39;\">&#39;+(d.type===&#39;word&#39;?&#39;ÕŹĢĶ»Ź&#39;:&#39;ÕÅŻĶ»Ł&#39;)+&#39;</span></div><div class=dtitle>&#39;+d.title+&#39;</div><div>&#39;+tags+&#39;</div>&#39;;document.getElementById(&#39;g&#39;).appendChild(c)}});</script></body></html>\"\"\"
open(\"index.html\",\"w\",encoding=\"utf-8\").write(idx)
print(\"Updated index.html\")
''')
        "

    - name: Run generator
      run: python3 generate.py

    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.html
        git diff --staged --quiet || git commit -m "Auto: daily words $(date +%Y-%m-%d)"
        git push
