name: Daily English Words Generator

on:
  schedule:
    # 北京时间 1:00 = UTC 17:00
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Generate daily content
      run: python3 generate.py

    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.html
        git diff --staged --quiet || git commit -m "Auto: daily words $(date +%Y-%m-%d)"
        git push
