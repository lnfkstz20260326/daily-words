    w=now.weekday()
    names=[\"Õæ©õĖĆ\",\"Õæ©õ║ī\",\"Õæ©õĖē\",\"Õæ©Õøø\",\"Õæ©õ║ö\",\"Õæ©ÕģŁ\",\"Õæ©µŚź\"]
    return now.strftime(\"%Y-%m-%d\"),names[w],\"word\" if w<5 else \"phrase\"
WORDS=[
    {\"w\":\"breakfast\",\"p\":\"/brekfest/\",\"m\":\"µŚ®ķźŁ\",\"e\":\"I eat breakfast every morning.\",\"ez\":\"µłæµ»ÅÕż®µŚ®õĖŖÕÉāµŚ®ķźŁŃĆé\",\"t\":\"break+fast=µēōńĀ┤ń”üķŻ¤\"},
