name: Daily English Words Generator

on:
  schedule:
    # 每天北京时间早上7点运行 (UTC 23:00/22:00 取决于夏令时)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD格式，留空使用今天)'
        required: false
        default: ''

jobs:
  generate-daily-words:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Get current date
      id: date
      run: |
        if [ -n "${{ github.event.inputs.date }}" ]; then
          echo "DATE=${{ github.event.inputs.date }}" >> $GITHUB_ENV
        else
          echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
        fi
        echo "YEAR=$(date +%Y)" >> $GITHUB_ENV
        echo "MONTH=$(date +%m)" >> $GITHUB_ENV
        echo "DAY=$(date +%d)" >> $GITHUB_ENV
        echo "WEEKDAY=$(date +%u)" >> $GITHUB_ENV
    
    - name: Generate daily content
      id: generate
      run: |
        node << 'EOF'
        const fs = require('fs');
        const path = require('path');
        
        const date = process.env.DATE;
        const year = process.env.YEAR;
        const month = process.env.MONTH;
        const day = process.env.DAY;
        const weekdayNum = parseInt(process.env.WEEKDAY);
        
        // 星期映射
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const weekday = weekdays[weekdayNum % 7];
        
        // 判断是工作日还是周末
        const isWeekend = weekdayNum === 6 || weekdayNum === 0;
        
        // 生成内容
        let content;
        if (isWeekend) {
          // 周末：5条口语短句
          content = generateWeekendContent(date, weekday);
        } else {
          // 工作日：5个单词
          content = generateWeekdayContent(date, weekday);
        }
        
        // 写入文件
        fs.writeFileSync(`${date}.html`, content);
        console.log(`Generated ${date}.html`);
        
        // 更新index.html
        updateIndex(date, weekday, isWeekend);
        
        function generateWeekdayContent(date, weekday) {
          // 这里使用预设的单词库，实际可以从API或数据库获取
          const words = getWeekdayWords();
          
          return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日英语单词 - ${date}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #bbdefb 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px; }
        .header h1 { font-size: 2em; color: #1565c0; margin-bottom: 10px; }
        .header .subtitle { color: #666; font-size: 1em; }
        .notice {
            background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px;
            padding: 10px 20px; text-align: center; color: #2e7d32;
            margin-bottom: 20px; font-size: 0.9em;
        }
        .control-panel { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; display: flex; align-items: center; gap: 5px; }
        .btn-green { background: #4caf50; color: white; }
        .btn-green:hover { background: #45a049; transform: scale(1.05); }
        .btn-gray { background: #9e9e9e; color: white; }
        .btn-gray:hover { background: #757575; }
        .word-card {
            background: white; border-radius: 16px; padding: 25px;
            margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-left: 5px solid #ff9800;
        }
        .word-card:nth-child(2) { border-left-color: #9c27b0; }
        .word-card:nth-child(3) { border-left-color: #f44336; }
        .word-card:nth-child(4) { border-left-color: #2196f3; }
        .word-card:nth-child(5) { border-left-color: #4caf50; }
        .word-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .word-number { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.1em; }
        .word-number.n1 { background: #ff9800; }
        .word-number.n2 { background: #9c27b0; }
        .word-number.n3 { background: #f44336; }
        .word-number.n4 { background: #2196f3; }
        .word-number.n5 { background: #4caf50; }
        .word-title { font-size: 1.8em; font-weight: 700; color: #333; }
        .phonetic { color: #666; font-size: 1em; margin-left: 51px; margin-bottom: 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .word-meaning { margin-left: 51px; margin-bottom: 15px; }
        .tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.8em; margin-right: 8px; }
        .tag-type { background: #e3f2fd; color: #1976d2; }
        .tag-meaning { background: #ffebee; color: #c62828; font-weight: 600; }
        .sentence-section { margin-left: 51px; background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .sentence-label { color: #999; font-size: 0.85em; margin-bottom: 8px; }
        .sentence-en { color: #333; font-size: 1.1em; margin-bottom: 5px; }
        .sentence-zh { color: #666; font-size: 0.95em; }
        .button-row { margin-left: 51px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-small { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
        .btn-orange { background: #ff9800; color: white; }
        .btn-orange:hover { background: #f57c00; }
        .btn-blue { background: #2196f3; color: white; }
        .btn-blue:hover { background: #1976d2; }
        .btn-green-small { background: #4caf50; color: white; }
        .btn-green-small:hover { background: #45a049; }
        .btn-red { background: #f44336; color: white; }
        .btn-red:hover { background: #d32f2f; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 每日英语单词</h1>
            <div class="subtitle">${date}（${weekday}）· 小学五年级日常口语</div>
        </div>
        <div class="notice">💡 建议使用 Chrome 或 Edge 浏览器，语音效果更好！</div>
        <div class="control-panel">
            <button class="btn btn-green" onclick="startLoopReading()">▶ 开始循环朗读</button>
            <button class="btn btn-gray" onclick="goBack()">↩ 返回选择</button>
        </div>
        ${words.map((w, i) => generateWordCard(w, i)).join('')}
    </div>
    <script>
        const words = ${JSON.stringify(words)};
        let isLooping = false;
        function speak(text, rate = 1) {
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; utterance.rate = rate; utterance.pitch = 1;
                const voices = speechSynthesis.getVoices();
                const preferredVoice = voices.find(v => v.name.includes('Jenny')) || voices.find(v => v.name.includes('Aria')) || voices.find(v => v.name.includes('Google US English')) || voices.find(v => v.name.includes('Samantha')) || voices.find(v => v.lang.startsWith('en'));
                if (preferredVoice) utterance.voice = preferredVoice;
                utterance.onend = resolve;
                speechSynthesis.speak(utterance);
            });
        }
        function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
        async function speakPhrase(index, type, rate) {
            stopSpeaking();
            const text = type === 'word' ? words[index].word : words[index].sentence;
            for (let i = 0; i < 3; i++) { await speak(text, rate); if (i < 2) await wait(300); }
        }
        async function startLoopReading() {
            if (isLooping) return; isLooping = true;
            async function loop() {
                if (!isLooping) return;
                for (let i = 0; i < words.length; i++) {
                    if (!isLooping) return;
                    await speakPhrase(i, 'sentence', 0.85);
                    if (i < words.length - 1) await wait(1000);
                }
                if (isLooping) { await wait(2000); loop(); }
            }
            loop();
        }
        function stopSpeaking() { isLooping = false; speechSynthesis.cancel(); }
        function goBack() { window.location.href = './index.html'; }
        if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices(); }
    </script>
</body>
</html>`;
        }
        
        function generateWordCard(word, index) {
          const colors = ['n1', 'n2', 'n3', 'n4', 'n5'];
          return `
        <div class="word-card">
            <div class="word-header">
                <div class="word-number ${colors[index]}">${index + 1}</div>
                <div class="word-title">${word.word}</div>
            </div>
            <div class="phonetic">${word.phonetic}</div>
            <div class="word-meaning">
                <span class="tag tag-type">${word.type}</span>
                <span class="tag tag-meaning">${word.meaning}</span>
            </div>
            <div class="sentence-section">
                <div class="sentence-label">例句</div>
                <div class="sentence-en">${word.sentence}</div>
                <div class="sentence-zh">${word.sentenceZh}</div>
            </div>
            <div class="button-row">
                <button class="btn-small btn-orange" onclick="speakPhrase(${index}, 'word', 0.7)">🐢 慢速词×3</button>
                <button class="btn-small btn-blue" onclick="speakPhrase(${index}, 'word', 1)">🚀 匀速词×3</button>
                <button class="btn-small btn-orange" onclick="speakPhrase(${index}, 'sentence', 0.7)">🐢 慢速句×3</button>
                <button class="btn-small btn-blue" onclick="speakPhrase(${index}, 'sentence', 1)">🚀 匀速句×3</button>
                <button class="btn-small btn-green-small" onclick="speakPhrase(${index}, 'sentence', 1.2)">⚡ 常速句×3</button>
                <button class="btn-small btn-red" onclick="stopSpeaking()">⏹ 停止</button>
            </div>
        </div>`;
        }
        
        function getWeekdayWords() {
          // 这里可以根据日期返回不同的单词，或者从API获取
          // 暂时返回示例数据
          return [
            { word: "get up", phonetic: "/ɡet ʌp/", type: "日常", meaning: "起床", sentence: "I get up at seven every morning.", sentenceZh: "我每天早上七点起床。" },
            { word: "wash face", phonetic: "/wɒʃ feɪs/", type: "日常", meaning: "洗脸", sentence: "Wash your face before breakfast.", sentenceZh: "吃早饭前洗脸。" },
            { word: "brush teeth", phonetic: "/brʌʃ tiːθ/", type: "日常", meaning: "刷牙", sentence: "I brush my teeth twice a day.", sentenceZh: "我每天刷两次牙。" },
            { word: "have breakfast", phonetic: "/hæv ˈbrekfəst/", type: "日常", meaning: "吃早餐", sentence: "What do you have for breakfast?", sentenceZh: "你早餐吃什么？" },
            { word: "go to school", phonetic: "/ɡəʊ tuː skuːl/", type: "日常", meaning: "去上学", sentence: "I go to school by bike.", sentenceZh: "我骑自行车去上学。" }
          ];
        }
        
        function generateWeekendContent(date, weekday) {
          // 周末生成口语短句
          const phrases = getWeekendPhrases();
          // 类似上面的结构，但内容改为短句
          return generateWeekdayContent(date, weekday); // 暂时使用相同模板
        }
        
        function getWeekendPhrases() {
          return [
            { word: "What time is it?", phonetic: "/wɒt taɪm ɪz ɪt/", type: "口语", meaning: "现在几点了？", sentence: "What time is it? It's seven o'clock.", sentenceZh: "现在几点了？七点了。" },
            { word: "I'm hungry.", phonetic: "/aɪm ˈhʌŋɡri/", type: "口语", meaning: "我饿了。", sentence: "I'm hungry. Let's have lunch.", sentenceZh: "我饿了。我们吃午饭吧。" },
            { word: "Can you help me?", phonetic: "/kæn juː help miː/", type: "口语", meaning: "你能帮我一下吗？", sentence: "Can you help me with my homework?", sentenceZh: "你能帮我做作业吗？" },
            { word: "I don't understand.", phonetic: "/aɪ dəʊnt ˌʌndəˈstænd/", type: "口语", meaning: "我不明白/我听不懂。", sentence: "I don't understand. Can you say it again?", sentenceZh: "我不明白。你能再说一遍吗？" },
            { word: "See you tomorrow!", phonetic: "/siː juː təˈmɒrəʊ/", type: "口语", meaning: "明天见！", sentence: "Goodbye! See you tomorrow!", sentenceZh: "再见！明天见！" }
          ];
        }
        
        function updateIndex(date, weekday, isWeekend) {
          // 读取现有的index.html并更新
          let indexContent = fs.readFileSync('index.html', 'utf8');
          
          // 在DATA数组中添加新数据
          const newData = {
            date: date,
            day: weekday,
            type: isWeekend ? "phrase" : "word",
            title: isWeekend ? "日常生活口语短句" : "日常实用单词",
            words: isWeekend ? getWeekendPhrases() : getWeekdayWords()
          };
          
          // 这里需要解析并更新JavaScript中的DATA数组
          // 简化处理：直接在数组末尾追加
          const dataString = JSON.stringify(newData, null, 2);
          
          // 查找DATA数组并在开头插入新数据
          const insertMarker = 'const DATA = [';
          if (indexContent.includes(insertMarker)) {
            indexContent = indexContent.replace(
              insertMarker,
              `${insertMarker}\n${dataString},`
            );
          }
          
          fs.writeFileSync('index.html', indexContent);
          console.log(`Updated index.html`);
        }
        EOF
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto: Generate daily words for ${{ env.DATE }}"
        git push
