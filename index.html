  font-weight: 600;
  background: rgba(255,255,255,0.2);
  color: #fff;
  transition: all 0.2s;
}
.tab-btn:hover { background: rgba(255,255,255,0.35); }
.tab-btn.active { background: #ff9800; color: #fff; }

.calendar-wrap {
  background: #fff;
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 720px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  color: #1e293b;
}
.cal-header {
  text-align: center;
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 16px;
  color: #4a3f8f;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-weekday {
  text-align: center;
  font-size: 0.8rem;
  color: #94a3b8;
  font-weight: 600;
  padding: 4px 0;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  cursor: default;
  font-size: 0.95rem;
  color: #94a3b8;
  transition: all 0.15s;
  position: relative;
  min-height: 54px;
}
.cal-day.has-content {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  cursor: pointer;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(102,126,234,0.35);
}
.cal-day.has-content:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(102,126,234,0.5);
}
.cal-day.today {
  background: linear-gradient(135deg, #ff9800, #f57c00) !important;
  color: #fff !important;
  box-shadow: 0 4px 14px rgba(255,152,0,0.5) !important;
}
.cal-day .day-num { font-size: 1rem; }
.cal-day .day-label { font-size: 0.6rem; margin-top: 2px; opacity: 0.9; }
.cal-day.empty { background: transparent; cursor: default; }

.bottom-bar {
  margin-top: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.status-tip {
  font-size: 0.85rem;
  color: #ff9800;
  flex: 1;
  min-width: 160px;
}
.btn-row { display: flex; gap: 10px; }
.btn {

  border: none;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 600;

.btn-today {

.btn-confirm {

</style>

// ===================== 主逻辑 =====================
var dateSet = {};
DATA.forEach(function(d) { dateSet[d.date] = d; });

var today = new Date();
var todayStr = today.getFullYear() + '-' +
  String(today.getMonth()+1).padStart(2,'0') + '-' +
  String(today.getDate()).padStart(2,'0');

var selYear = today.getFullYear();
var selMonth = today.getMonth() + 1; // 1-12
var selDate = null; // 当前选中的日期字符串

// 收集有内容的年份
var years = [];
DATA.forEach(function(d) {
  var y = parseInt(d.date.split('-')[0]);
  if (years.indexOf(y) < 0) years.push(y);
});
if (years.indexOf(today.getFullYear()) < 0) years.push(today.getFullYear());
years.sort();

function buildYearTabs() {
  var wrap = document.getElementById('yearTabs');
  wrap.innerHTML = '';
  years.forEach(function(y) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn' + (y === selYear ? ' active' : '');
    btn.textContent = y + '年';
    btn.onclick = function() { selYear = y; selMonth = 1; buildMonthTabs(); buildCalendar(); };
    wrap.appendChild(btn);
  });
}

function buildMonthTabs() {
  var wrap = document.getElementById('monthTabs');
  wrap.innerHTML = '';
  for (var m = 1; m <= 12; m++) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn' + (m === selMonth ? ' active' : '');
    btn.textContent = m + '月';
    (function(mm) {
      btn.onclick = function() { selMonth = mm; buildMonthTabs(); buildCalendar(); };
    })(m);
    wrap.appendChild(btn);
  }
}

var weekdays = ['日','一','二','三','四','五','六'];

function buildCalendar() {
  document.getElementById('calHeader').textContent = selYear + '年' + selMonth + '月';
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // 星期标题
  weekdays.forEach(function(w) {
    var d = document.createElement('div');
    d.className = 'cal-weekday';
    d.textContent = w;
    grid.appendChild(d);
  });

  var firstDay = new Date(selYear, selMonth-1, 1).getDay(); // 0=日
  var daysInMonth = new Date(selYear, selMonth, 0).getDate();

  // 空格
  for (var i = 0; i < firstDay; i++) {
    var e = document.createElement('div');
    e.className = 'cal-day empty';
    grid.appendChild(e);
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = selYear + '-' +
      String(selMonth).padStart(2,'0') + '-' +
      String(d).padStart(2,'0');
    var cell = document.createElement('div');
    cell.className = 'cal-day';

    var isToday = (dateStr === todayStr);
    var hasContent = !!dateSet[dateStr];

    if (isToday) {
      cell.classList.add('today');
      cell.classList.add('has-content'); // always clickable for today
    } else if (hasContent) {
      cell.classList.add('has-content');
    }

    var numDiv = document.createElement('div');
    numDiv.className = 'day-num';
    numDiv.textContent = d;
    cell.appendChild(numDiv);

    if (hasContent) {
      var labelDiv = document.createElement('div');
      labelDiv.className = 'day-label';
      labelDiv.textContent = dateSet[dateStr].type === 'phrase' ? '短句' : '听说';
      cell.appendChild(labelDiv);
    }

    if (hasContent || isToday) {
      (function(ds) {
        cell.onclick = function() {
          selDate = ds;
          // 清除旧选中
          document.querySelectorAll('.cal-day.selected').forEach(function(el) {
            el.classList.remove('selected');
          });
          cell.classList.add('selected');
          updateStatus(ds);
        };
      })(dateStr);
    }

    grid.appendChild(cell);
  }

  updateStatus(selDate);
}

function updateStatus(ds) {
  var tip = document.getElementById('statusTip');
  var btn = document.getElementById('confirmBtn');
  if (!ds) {
    if (dateSet[todayStr]) {
      tip.textContent = '';
      btn.className = 'btn btn-confirm';
    } else {
      tip.textContent = '▲ ' + todayStr + ' 暂无学习内容';
      btn.className = 'btn btn-confirm';
    }
    return;
  }
  if (dateSet[ds]) {
    var item = dateSet[ds];
    var label = item.type === 'phrase' ? '口语短句' : '词汇练习';
    tip.textContent = '✓ ' + ds + ' · ' + label + ' · ' + item.title;
    btn.className = 'btn btn-confirm ready';
  } else {
    tip.textContent = '▲ ' + ds + ' 暂无学习内容';
    btn.className = 'btn btn-confirm';
  }
}

function goToday() {
  var d = new Date();
  selYear = d.getFullYear();
  selMonth = d.getMonth() + 1;
  selDate = todayStr;
  buildYearTabs();
  buildMonthTabs();
  buildCalendar();
  if (dateSet[todayStr]) {
    window.location.href = todayStr + '.html';
  } else {
    updateStatus(todayStr);
  }
}

function goSelected() {
  if (selDate && dateSet[selDate]) {
    window.location.href = selDate + '.html';
  } else if (!selDate && dateSet[todayStr]) {
    window.location.href = todayStr + '.html';
  }
}

// 初始化
buildYearTabs();
buildMonthTabs();
buildCalendar();

// 自动跳今天（如果有内容）
if (dateSet[todayStr]) {
  window.location.href = todayStr + '.html';
}
</script>
