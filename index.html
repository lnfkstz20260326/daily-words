<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日英语单词 · 日期选择</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;padding:20px;
    display:flex;align-items:center;justify-content:center
  }
  .container{
    background:#fff;border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,.3);
    padding:40px 30px;
    max-width:500px;width:90%;
    text-align:center
  }
  h1{
    font-size:1.8rem;font-weight:800;
    color:#2c3e50;margin-bottom:10px
  }
  .subtitle{
    font-size:.9rem;color:#7f8c8d;margin-bottom:30px
  }
  .date-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
    gap:12px;
    margin-bottom:30px
  }
  .date-btn{
    padding:12px 8px;
    border:none;
    border-radius:12px;
    font-size:.9rem;
    font-weight:600;
    cursor:pointer;
    transition:all .2s;
    background:#ecf0f1;
    color:#2c3e50
  }
  .date-btn:hover{
    background:#3498db;
    color:#fff;
    transform:translateY(-2px);
    box-shadow:0 4px 12px rgba(52,152,219,.3)
  }
  .date-btn.today{
    background:#e74c3c;
    color:#fff
  }
  .date-btn.today:hover{
    background:#c0392b
  }
  .footer{
    font-size:.8rem;
    color:#95a5a6;
    margin-top:20px
  }
</style>
</head>
<body>

<div class="container">
  <h1>📚 每日英语单词</h1>
  <p class="subtitle">选择日期开始学习</p>
  
  <div class="date-grid" id="dateGrid"></div>
  
  <p class="footer">AI英语学习工具 · 从听力抓起 · 每日积累</p>
</div>

<script>
// 生成日期列表
const dateGrid = document.getElementById('dateGrid');
const today = new Date();
const availableDates = [];

// 从3月27日开始往后生成30天的日期
for (let i = 0; i < 30; i++) {
  const date = new Date(today);
  date.setDate(today.getDate() + i);
  
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  const dateStr = `${year}-${month}-${day}`;
  
  availableDates.push(dateStr);
}

// 渲染日期按钮
availableDates.forEach((date, index) => {
  const btn = document.createElement('button');
  btn.className = 'date-btn';
  
  // 格式化日期显示
  const [year, month, day] = date.split('-');
  const weekday = ['周日','周一','周二','周三','周四','周五','周六'][new Date(date).getDay()];
  
  // 判断是否是今天
  if (date === '2026-03-27') {
    btn.className += ' today';
  }
  
  btn.textContent = `${month}-${day}\n${weekday}`;
  btn.onclick = () => {
    window.location.href = `${date}.html`;
  };
  
  dateGrid.appendChild(btn);
});

// 自动检测并跳转到今天（如果停留超过2秒）
setTimeout(() => {
  const stay = new URLSearchParams(window.location.search).get('stay');
  if (!stay) {
    window.location.href = '2026-03-27.html';
  }
}, 2000);
</script>

</body>
</html>
