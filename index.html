<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日英语单词 · 日期选择</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;padding:20px;
    display:flex;align-items:center;justify-content:center
  }
  .container{
    background:#fff;border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,.3);
    padding:40px 30px;
    max-width:580px;width:90%;
    text-align:center
  }
  h1{
    font-size:1.8rem;font-weight:800;
    color:#2c3e50;margin-bottom:10px
  }
  .subtitle{
    font-size:.9rem;color:#7f8c8d;margin-bottom:25px
  }
  .month-selector{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:25px
  }
  .month-btn{
    padding:10px 18px;
    border:none;
    border-radius:25px;
    font-size:.9rem;
    font-weight:600;
    cursor:pointer;
    transition:all .2s;
    background:#ecf0f1;
    color:#2c3e50;
    position:relative
  }
  .month-btn:hover{
    background:#3498db;
    color:#fff;
    transform:translateY(-2px)
  }
  .month-btn.active{
    background:#e74c3c;
    color:#fff
  }
  .month-btn.has-data::after{
    content:'●';
    position:absolute;
    top:3px;
    right:3px;
    font-size:12px;
    color:#27ae60
  }
  .date-list{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:12px;
    margin-bottom:25px
  }
  .date-btn{
    padding:14px 10px;
    border:none;
    border-radius:12px;
    font-size:.95rem;
    font-weight:600;
    cursor:pointer;
    transition:all .2s;
    background:#f8f9fa;
    color:#2c3e50
  }
  .date-btn:hover{
    background:#3498db;
    color:#fff;
    transform:translateY(-2px);
    box-shadow:0 4px 12px rgba(52,152,219,.3)
  }
  .date-btn.today{
    background:#e74c3c;
    color:#fff
  }
  .date-btn.today:hover{
    background:#c0392b
  }
  .footer{
    font-size:.8rem;
    color:#95a5a6;
    margin-top:20px
  }
  .btn-back-to-page{
    background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;
    font-size:.9rem;padding:10px 24px;border-radius:50px;border:none;cursor:pointer;
    box-shadow:0 4px 14px rgba(230,126,34,.35);font-weight:600;letter-spacing:0.5px;
    transition:all .2s;margin-top:20px;display:none
  }
  .btn-back-to-page:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(230,126,34,.4)}
  .btn-back-to-page.visible{display:inline-block}
  .empty-hint{
    color:#95a5a6;
    font-size:.9rem;
    padding:30px 0;
    font-style:italic
  }
</style>
</head>
<body>

<div class="container">
  <h1>📚 每日英语单词</h1>
  <p class="subtitle">选择月份和日期开始学习</p>
  
  <!-- 月份选择器 -->
  <div class="month-selector" id="monthSelector"></div>
  
  <!-- 日期列表 -->
  <div class="date-list" id="dateList"></div>
  <div class="empty-hint" id="emptyHint" style="display:none">该月份暂无内容</div>
  
  <button class="btn-back-to-page" id="btnBackToPage" onclick="goToLastPage()">🔄 返回上次学习</button>
  
  <p class="footer">AI英语学习工具 · 从听力抓起 · 每日积累</p>
</div>

<script>
// 可用日期列表（从3月27日开始往后30天）
const today = new Date('2026-03-27');
const availableDates = [];

for (let i = 0; i < 30; i++) {
  const date = new Date(today);
  date.setDate(today.getDate() + i);
  
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  const dateStr = `${year}-${month}-${day}`;
  
  availableDates.push({
    dateStr: dateStr,
    year: year,
    month: month,
    day: day,
    weekday: ['周日','周一','周二','周三','周四','周五','周六'][date.getDay()],
    isToday: dateStr === '2026-03-27'
  });
}

// 按月份分组
const datesByMonth = {};
availableDates.forEach(d => {
  const key = `${d.year}-${d.month}`;
  if (!datesByMonth[key]) {
    datesByMonth[key] = [];
  }
  datesByMonth[key].push(d);
});

// 当前选中的月份
let currentMonth = Object.keys(datesByMonth)[0];

// 渲染月份选择器
const monthSelector = document.getElementById('monthSelector');
const months = Object.keys(datesByMonth).sort();

months.forEach(monthKey => {
  const [year, month] = monthKey.split('-');
  const btn = document.createElement('button');
  btn.className = 'month-btn';
  btn.textContent = `${month}月`;
  btn.dataset.month = monthKey;
  
  // 标记有数据的月份（所有月份都有数据）
  btn.classList.add('has-data');
  
  if (monthKey === currentMonth) {
    btn.classList.add('active');
  }
  
  btn.onclick = () => {
    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMonth = monthKey;
    renderDates();
  };
  
  monthSelector.appendChild(btn);
});

// 渲染日期列表
const dateList = document.getElementById('dateList');
const emptyHint = document.getElementById('emptyHint');

function renderDates() {
  dateList.innerHTML = '';
  
  const dates = datesByMonth[currentMonth] || [];
  
  if (dates.length === 0) {
    emptyHint.style.display = 'block';
    return;
  }
  
  emptyHint.style.display = 'none';
  
  dates.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'date-btn';
    
    if (d.isToday) {
      btn.className += ' today';
    }
    
    btn.innerHTML = `${d.day}<br><span style="font-size:.8rem;color:#7f8c8d">${d.weekday}</span>`;
    btn.onclick = () => {
      window.location.href = `${d.dateStr}.html`;
    };
    
    dateList.appendChild(btn);
  });
}

// 初始渲染
renderDates();

// 从URL获取上次访问的页面
const urlParams = new URLSearchParams(window.location.search);
const lastPage = urlParams.get('from');

// 如果有上次访问的页面，显示"返回上次学习"按钮
if (lastPage) {
  const btnBackToPage = document.getElementById('btnBackToPage');
  if (btnBackToPage) {
    btnBackToPage.classList.add('visible');
  }
}

// 返回上次学习的页面
function goToLastPage() {
  if (lastPage) {
    window.location.href = lastPage;
  }
}

// 自动检测并跳转到今天（如果停留超过5秒）
let autoJumpTimeout = setTimeout(() => {
  const stay = new URLSearchParams(window.location.search).get('stay');
  if (!stay) {
    window.location.href = '2026-03-27.html';
  }
}, 5000);

// 用户点击任何按钮时取消自动跳转
document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => {
    clearTimeout(autoJumpTimeout);
  });
});

// 如果有from参数，取消自动跳转（因为用户是从其他页面跳转回来的）
if (lastPage) {
  clearTimeout(autoJumpTimeout);
}
</script>

</body>
</html>
