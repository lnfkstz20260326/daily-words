// ===================== 娓叉煋 =====================
function render() {
  var grid = document.getElementById('grid');
  var statsBar = document.getElementById('statsBar');
  grid.innerHTML = '';

  // 缁熻
  var wordDays = DATA.filter(function(d){ return d.type === 'word'; }).length;
  var phraseDays = DATA.filter(function(d){ return d.type === 'phrase'; }).length;
  statsBar.innerHTML = '鍏?<span>' + DATA.length + '</span> 澶╄褰?路 <span>' + wordDays + '</span> 澶╁崟璇?路 <span>' + phraseDays + '</span> 澶╃煭鍙?;

  // 鏈€鏂扮殑鏄剧ず鍦ㄥ墠闈?
  var sorted = DATA.slice().reverse();
  sorted.forEach(function(item) {
    var a = document.createElement('a');
    a.className = 'day-card' + (item.type === 'phrase' ? ' phrase' : '');
    a.href = item.date + '.html';
    var chips = '';
    item.words.forEach(function(w) {
      chips += '<div class="chip">' + w.en + '<span>' + w.zh + '</span></div>';
    });
    var badgeClass = item.type === 'phrase' ? ' phrase' : '';
    var badgeText = item.type === 'phrase' ? '鐭彞' : '鍗曡瘝';
    var icon = item.type === 'phrase' ? '馃挰' : '馃専';
    a.innerHTML =
      '<div class="day-card-header">' +
        '<span class="day-date">' + item.date + ' ' + item.day + '</span>' +
        '<span class="day-badge' + badgeClass + '">' + badgeText + '</span>' +
      '</div>' +
      '<div class="day-title">' + icon + ' ' + item.title + '</div>' +
      '<div class="word-chips">' + chips + '</div>';
    grid.appendChild(a);
  });
}
