<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日英语词汇总览</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    background:linear-gradient(135deg,#e8f4f8 0%,#fef9f0 100%);
    min-height:100vh;padding:16px 12px 60px;color:#2c3e50;
  }
  h1{text-align:center;font-size:1.5rem;font-weight:800;color:#1a6e9e;margin-bottom:8px;letter-spacing:1px}
  .subtitle{text-align:center;font-size:.82rem;color:#7f8c8d;margin-bottom:6px}
  .search-wrap{
    max-width:500px;margin:0 auto 16px;
    position:relative
  }
  #searchInput{
    width:100%;padding:12px 16px;border:2px solid #d5dbdb;border-radius:25px;
    font-size:.95rem;outline:none;transition:border-color .2s
  }
  #searchInput:focus{border-color:#3498db}
  .filter-wrap{
    display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap
  }
  .filter-btn{
    padding:6px 16px;border:none;border-radius:20px;font-size:.85rem;
    font-weight:600;cursor:pointer;background:#ecf0f1;color:#7f8c8d;transition:all .2s
  }
  .filter-btn.active{background:#3498db;color:#fff}
  .stats{
    text-align:center;font-size:.85rem;color:#7f8c8d;margin-bottom:12px;
    background:#f8f9fa;padding:6px 12px;border-radius:15px;display:inline-block;
    margin-left:50%;transform:translateX(-50%)
  }
  .month{
    margin:0 0 20px
  }
  .month-title{
    font-size:1.1rem;font-weight:700;color:#3498db;margin-bottom:10px;
    padding-bottom:6px;border-bottom:2px solid #ecf0f1
  }
  .day-item{
    background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;transition:all .18s;
    border-left:4px solid #3498db
  }
  .day-item:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,.1)}
  .day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .day-date{font-weight:700;font-size:1rem;color:#2c3e50}
  .day-type{
    font-size:.75rem;padding:2px 8px;border-radius:10px;font-weight:600
  }
  .type-word{background:#eaf4fb;color:#2980b9}
  .type-phrase{background:#fef9e7;color:#d68910}
  .day-items{font-size:.85rem;color:#7f8c8d;display:flex;flex-wrap:wrap;gap:6px}
  .day-item-tag{
    background:#f0f3f4;padding:2px 8px;border-radius:5px;font-size:.8rem
  }
  .day-actions{display:flex;gap:8px;margin-top:8px}
  .play-btn{
    flex:1;padding:7px;border:none;border-radius:8px;font-size:.85rem;
    font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;
    justify-content:center;gap:5px
  }
  .play-btn:active{transform:scale(.97)}
  .btn-day{background:#3498db;color:#fff}
  .btn-word{background:#27ae60;color:#fff}
  .loading{
    text-align:center;font-size:.9rem;color:#7f8c8d;padding:20px
  }
  .empty{
    text-align:center;padding:30px;font-size:.95rem;color:#95a5a6
  }
  footer{
    text-align:center;color:#bdc3c7;font-size:.75rem;margin-top:20px;
    position:fixed;bottom:10px;left:0;right:0
  }
</style>
</head>
<body>

<h1>📚 每日英语词汇总览</h1>
<p class="subtitle">积累每一天，进步看得见</p>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="搜索单词、例句、中文..." oninput="filterItems()">
</div>

<div class="filter-wrap">
  <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">全部</button>
  <button class="filter-btn" id="filterWord" onclick="setFilter('word')">单词</button>
  <button class="filter-btn" id="filterPhrase" onclick="setFilter('phrase')">口语</button>
</div>

<div class="stats" id="stats">累计 0 天 · 0 个词汇</div>

<div id="library"></div>

<footer>🌟 坚持每天学习，一年掌握 1825 个单词！</footer>

<script>
/* ── Library Data (will be updated by automation) ── */
const LIBRARY = [
  {
    date: "2026-03-26",
    weekday: "周四",
    type: "word",
    title: "亲子成长 & 日常生活",
    items: [
      { en:"encourage", zh:"鼓励；给劲", sentence:"You're doing great! I'll always encourage you." },
      { en:"patient", zh:"有耐心的；不着急", sentence:"Be patient. Learning takes time." },
      { en:"remind", zh:"提醒；告诉", sentence:"Let me remind you. Pack your bag." },
      { en:"curious", zh:"好奇的；想知道", sentence:"You're so curious. Keep asking!" },
      { en:"tidy", zh:"整理；收拾", sentence:"Can you tidy up your room?" }
    ]
  }
];

/* ── State ── */
let currentFilter = 'all';

/* ── Render Library ── */
function renderLibrary() {
  const lib = document.getElementById('library');
  const search = document.getElementById('searchInput').value.toLowerCase();
  
  let filtered = LIBRARY.filter(item => {
    // Type filter
    if (currentFilter !== 'all' && item.type !== currentFilter) return false;
    
    // Search filter
    if (search) {
      const text = item.items.map(i => i.en + ' ' + i.zh + ' ' + (i.sentence || '')).join(' ').toLowerCase();
      if (!text.includes(search)) return false;
    }
    return true;
  });

  // Group by month
  const grouped = {};
  filtered.forEach(item => {
    const month = item.date.substring(0, 7); // YYYY-MM
    if (!grouped[month]) grouped[month] = [];
    grouped[month].push(item);
  });

  // Render
  let html = '';
  const monthNames = ['01','02','03','04','05','06','07','08','09','10','11','12'];
  
  for (const [month, items] of Object.entries(grouped).sort().reverse()) {
    html += `<div class="month">`;
    html += `<div class="month-title">${month}</div>`;
    
    items.forEach(item => {
      const typeClass = item.type === 'word' ? 'type-word' : 'type-phrase';
      const typeText = item.type === 'word' ? '单词' : '口语';
      
      html += `<div class="day-item" onclick="openDay('${item.date}')">`;
      html += `<div class="day-header">`;
      html += `<span class="day-date">${item.weekday} · ${item.date}</span>`;
      html += `<span class="day-type ${typeClass}">${typeText}</span>`;
      html += `</div>`;
      html += `<div style="font-size:.85rem;color:#7f8c8d;margin-bottom:6px">${item.title}</div>`;
      html += `<div class="day-items">`;
      item.items.forEach(i => {
        html += `<span class="day-item-tag">${i.en}</span>`;
      });
      html += `</div>`;
      html += `<div class="day-actions" onclick="event.stopPropagation()">`;
      html += `<button class="play-btn btn-day" onclick="playDay('${item.date}')">▶️ 全天播放</button>`;
      html += `</div>`;
      html += `</div>`;
    });
    
    html += `</div>`;
  }

  if (!html) {
    html = `<div class="empty">没有找到匹配的内容</div>`;
  }

  lib.innerHTML = html;
  updateStats(filtered);
}

/* ── Update Stats ── */
function updateStats(items) {
  const days = items.length;
  const words = items.reduce((sum, item) => sum + item.items.length, 0);
  document.getElementById('stats').textContent = `累计 ${days} 天 · ${words} 个词汇`;
}

/* ── Filter ── */
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('filter' + filter.charAt(0).toUpperCase() + filter.slice(1)).classList.add('active');
  renderLibrary();
}

function filterItems() {
  renderLibrary();
}

/* ── Open Day Page ── */
function openDay(date) {
  const url = `file:///c:/Users/Lenovo/WorkBuddy/Claw/.workbuddy/daily-words/${date}.html`;
  window.open(url, '_blank');
}

/* ── Play Day (simple implementation using browser speech) ── */
async function playDay(date) {
  const item = LIBRARY.find(i => i.date === date);
  if (!item) return;
  
  if (!confirm(`开始播放 ${item.weekday} 的内容？`)) return;
  
  for (const word of item.items) {
    if (typeof speechSynthesis === 'undefined') {
      alert('您的浏览器不支持语音播放'); return;
    }
    
    const u = new SpeechSynthesisUtterance(word.en);
    u.lang = 'en-US';
    u.rate = 0.85;
    speechSynthesis.speak(u);
    await new Promise(r => setTimeout(r, 2000));
  }
}

/* ── Initialize ── */
window.addEventListener('load', () => {
  renderLibrary();
});
</script>
</body>
</html>
